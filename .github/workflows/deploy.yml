name: Deploy React App

on:
  push:
    branches:
      - main  # Change this to your default branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Latest version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18  # Use stable version

      - name: Install dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build  # Ensure this matches your React build output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_branch: gh-pages  # Correct input name
          publish_dir: ./build
          force_orphan: true  # Optional: Makes sure the gh-pages branch is clean
